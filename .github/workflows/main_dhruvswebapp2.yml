name: Build and deploy ASP.NET Core app to Azure Web App - DhruvsWebApp2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'   # change if your project uses 6.0 or 7.0

      - name: Restore dependencies
        run: dotnet restore ./WebApp2API/WebApp2API.csproj

      - name: Build
        run: dotnet build ./WebApp2API/WebApp2API.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./WebApp2API/WebApp2API.csproj -c Release -o ./publish --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C8A88612206E44E4BA4B74A35F475B56 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_741BF500717D4D8C8503265E68AA58CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1E5327B1069C433AA75FCB1A2FFFAF18 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DhruvsWebApp2'
          slot-name: 'Production'
          package: ./publish